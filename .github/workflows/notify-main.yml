name: Notify ServEase-Main

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch sync event to ServEase-Main
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.MAIN_REPO_PAT }}
          repository: shoTEAM-Org/ServEase-Main
          event-type: sync-frontend